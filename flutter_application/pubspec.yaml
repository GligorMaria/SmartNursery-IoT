name: flutter_application
description: Smart Baby Monitor – temperature & humidity alerts via Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_database: ^11.1.0          # Realtime Database
         # Push notifications (FCM)

  # ── UI helpers ────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0                   # Temperature / humidity graphs
  intl: ^0.19.0                       # Date/time formatting
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true