name: flutter_application
description: Smart Baby Monitor – temperature & humidity alerts via Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.4.0          # pinned lower to stay on web ^0.5.x
  firebase_database: ^11.1.0
  firebase_messaging: ^15.1.0    # Push notifications (FCM)

  # ── WebRTC ────────────────────────────────────────────────────────────────
  flutter_webrtc: ^1.4.1         # uses web ^1.0.0 — compatible with firebase_core ^3.4+

  # ── UI helpers ────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true